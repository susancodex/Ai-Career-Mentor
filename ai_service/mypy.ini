[mypy]
python_version = 3.12
ignore_missing_imports = True
strict_optional = True
warn_redundant_casts = True
no_implicit_optional = True
# Exclude generated/migration files from strict checking
exclude = (migrations|alembic)

# FastAPI / Pydantic ecosystem
[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pydantic_settings.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

# LangChain / LangGraph
[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_google_genai.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

# Database / async
[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-pgvector.*]
ignore_missing_imports = True

# Observability
[mypy-langfuse.*]
ignore_missing_imports = True

[mypy-cloudinary.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True
