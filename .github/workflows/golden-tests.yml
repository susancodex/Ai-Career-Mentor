name: Golden Tests (real Gemini API)

# NEVER runs in standard PR CI — only on schedule or manual dispatch.
# This suite hits the real free-tier Gemini API to catch model-response
# regressions that mocks can't detect.  A separate GOOGLE_API_KEY_GOLDEN
# secret keeps golden quota separate from dev usage.
#
# Free-tier rate limit: 10 RPM / 500 RPD for gemini-2.5-flash.
# The suite must stay well under that — each test file gets a sleep buffer.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running golden tests?"
        required: false
        default: "manual verification"
  schedule:
    # 02:00 UTC every night — low-traffic window, avoids morning quota contention
    - cron: "0 2 * * *"

jobs:
  golden-ai-service:
    name: Golden tests — real Gemini API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: career_mentor_test
          POSTGRES_USER: career_mentor
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ai_service

    env:
      DATABASE_URL: postgresql+asyncpg://career_mentor:testpassword@localhost:5432/career_mentor_test
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY_GOLDEN }}
      AI_SERVICE_SHARED_SECRET: ${{ secrets.AI_SERVICE_SHARED_SECRET }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      GEMINI_RPM_LIMIT: "6"  # conservative — stay well under free-tier 10 RPM

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run golden tests (hits real Gemini API — charges free-tier quota)
        # Golden tests occasionally fail with 429 from the free tier — that is
        # expected behaviour, not a bug. Check for consistent failure across
        # multiple nights before treating it as a real regression.
        run: pytest tests/golden/ -v --tb=short --timeout=120
        continue-on-error: true
