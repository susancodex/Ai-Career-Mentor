name: CD — Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging
  cancel-in-progress: false   # never cancel a deploy in progress

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: echo "version=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI service image
        uses: docker/build-push-action@v5
        with:
          context: ai_service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy (replace with your hosting provider's deploy action)
        run: |
          echo "Deploy image tag ${{ needs.build-and-push.outputs.image_tag }} to staging."
          echo "Add your platform-specific deploy command here — e.g.:"
          echo ""
          echo "  Railway:  railway up --service backend"
          echo "  Fly.io:   fly deploy --image ghcr.io/.../backend:TAG --app career-mentor-backend-staging"
          echo "  VPS SSH:  ssh deploy@staging.yourdomain.com \\"
          echo "              'export TAG=$TAG && docker compose pull && docker compose up -d'"
          echo ""
          echo "Secrets needed in Settings → Environments → staging:"
          echo "  STAGING_API_BASE_URL, CLOUDINARY_CLOUD_NAME, CLOUDINARY_UPLOAD_PRESET"
          echo "  (+ any SSH key or platform token for your deploy target)"
          # Uncomment and fill in your deploy command:
          # ssh ${{ secrets.STAGING_SSH_HOST }} "
          #   export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ needs.build-and-push.outputs.image_tag }}
          #   export AI_SERVICE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:${{ needs.build-and-push.outputs.image_tag }}
          #   export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ needs.build-and-push.outputs.image_tag }}
          #   docker compose -f /app/infra/docker-compose.yml -f /app/infra/docker-compose.prod.yml pull
          #   docker compose -f /app/infra/docker-compose.yml -f /app/infra/docker-compose.prod.yml up -d
          #   docker compose -f /app/infra/docker-compose.yml exec backend python manage.py migrate --noinput
          # "
