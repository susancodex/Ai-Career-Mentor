name: CD — Staging

on:
  push:
    branches: [main]

concurrency:
  group: cd-staging
  cancel-in-progress: false   # never cancel a deploy in progress

env:
  REGISTRY: ${{ secrets.REGISTRY || 'ghcr.io' }}
  IMAGE_PREFIX: ${{ github.repository_owner }}/ai-career-mentor

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:staging-latest

      - name: Build & push AI service image
        uses: docker/build-push-action@v5
        with:
          context: ai_service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-service:staging-latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:staging-latest

  deploy-staging:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Deploy (replace this step with your hosting provider's deploy action)
        run: |
          echo "Deploy tag ${{ steps.meta.outputs.tag }} to staging."
          echo "Add your deploy step here — e.g. SSH + docker compose pull && up, Fly.io, Render, etc."
          # Example SSH deploy:
          # ssh $STAGING_HOST "
          #   export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.tag }}
          #   export AI_SERVICE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-service:${{ steps.meta.outputs.tag }}
          #   export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.tag }}
          #   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml pull
          #   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
          #   docker compose -f infra/docker-compose.yml exec backend python manage.py migrate --noinput
          # "
