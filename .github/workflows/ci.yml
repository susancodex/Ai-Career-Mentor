name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Django backend tests
    runs-on: ubuntu-latest
    # No Postgres or Redis service needed — pytest.ini points at
    # config.settings.test which uses SQLite in-memory. Django model fields
    # are all standard types (embedding is a JSONField, not pgvector), so
    # SQLite exercises every Django code path. pgvector search is tested
    # solely in the ai-service-test job.

    env:
      # pytest.ini sets DJANGO_SETTINGS_MODULE=config.settings.test,
      # which overrides the env var. Set it here anyway so manage.py calls
      # (e.g. collectstatic) also use the test settings if needed.
      DJANGO_SETTINGS_MODULE: config.settings.test
      # Must be ≥ 32 bytes to silence SimpleJWT's InsecureKeyLengthWarning
      SECRET_KEY: ci-test-secret-key-padded-to-32-bytes!!
      AI_SERVICE_SHARED_SECRET: ci-test-hmac-secret
      AI_SERVICE_URL: http://localhost:8001

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements/dev.txt
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  ai-service-test:
    name: FastAPI AI service tests
    runs-on: ubuntu-latest
    # No Postgres needed for the AI service tests either — DB calls in
    # core/db.py are mocked (pool patched to None → empty-default branch).
    env:
      GOOGLE_API_KEY: test-key-never-call-real-api
      AI_SERVICE_SHARED_SECRET: ci-test-hmac-secret
      DATABASE_URL: postgresql+asyncpg://career_mentor:testpassword@localhost:5432/career_mentor_test
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""
      GEMINI_RPM_LIMIT: "60"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ai_service
        run: pip install -r requirements.txt
      - name: Run tests (LLM mocked — never hits real Gemini API)
        working-directory: ai_service
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Golden tests — real Gemini API, run on schedule or manual dispatch only.
  # NEVER run in standard PR CI: will consume free-tier quota and may 429.
