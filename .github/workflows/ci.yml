name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Type-check
        run: pnpm run typecheck
      - name: Unit tests (Vitest + MSW — no real API calls)
        run: pnpm test --run
      - name: Build (verify production bundle compiles)
        run: pnpm run build
        env:
          VITE_API_BASE_URL: https://api.example.com/api/v1
          VITE_CLOUDINARY_CLOUD_NAME: test
          VITE_CLOUDINARY_UPLOAD_PRESET: test_preset

  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: career_mentor_test
          POSTGRES_USER: career_mentor
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://career_mentor:testpassword@localhost:5432/career_mentor_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-used-in-prod
      AI_SERVICE_URL: http://localhost:8001
      AI_SERVICE_SHARED_SECRET: ci-test-hmac-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy . --ignore-missing-imports
      - name: Run tests (AI mocked — no real Gemini calls)
        run: pytest --tb=short -q

  ai_service:
    name: AI Service — lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: career_mentor_test
          POSTGRES_USER: career_mentor
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ai_service
    env:
      DATABASE_URL: postgresql+asyncpg://career_mentor:testpassword@localhost:5432/career_mentor_test
      GOOGLE_API_KEY: ci-placeholder-never-used
      AI_SERVICE_SHARED_SECRET: ci-test-hmac-secret
      LANGFUSE_PUBLIC_KEY: ci-placeholder
      LANGFUSE_SECRET_KEY: ci-placeholder
      LANGFUSE_HOST: http://localhost:3001
      CLOUDINARY_CLOUD_NAME: ci-placeholder
      CLOUDINARY_API_KEY: ci-placeholder
      CLOUDINARY_API_SECRET: ci-placeholder
      GEMINI_RPM_LIMIT: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy . --ignore-missing-imports
      - name: Run tests (LLM mocked — never hits real Gemini API)
        run: pytest --tb=short -q

  docker-build:
    name: Docker — verify all images build
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai_service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          build-args: |
            VITE_API_BASE_URL=https://api.example.com/api/v1
            VITE_CLOUDINARY_CLOUD_NAME=test
            VITE_CLOUDINARY_UPLOAD_PRESET=test_preset
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
      - name: Build ai_service image
        uses: docker/build-push-action@v5
        with:
          context: ai_service
          push: false
