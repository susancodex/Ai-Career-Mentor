kind = "web"
previewPath = "/"
title = "AI Career Mentor"
version = "1.0.0"
id = "artifacts/ai-career-mentor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21394

[services.development]
run = "pnpm --filter @workspace/ai-career-mentor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-career-mentor", "run", "build" ]
publicDir = "artifacts/ai-career-mentor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21394"
BASE_PATH = "/"
