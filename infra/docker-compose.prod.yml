# infra/docker-compose.prod.yml
# Production overrides. Use with:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - No bind mounts (use pinned image tags instead)
#   - ai_service is on the internal network ONLY (no published port)
#   - backend and ai_service use config.settings.prod
#   - Langfuse not included (use cloud.langfuse.com or run separately)

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [internal]

  ai_service:
    image: ${AI_SERVICE_IMAGE:-ai-career-mentor-ai-service:latest}
    restart: unless-stopped
    volumes: []
    expose: ["8001"]
    networks: [internal]
    environment:
      LOG_LEVEL: "WARNING"

  backend:
    image: ${BACKEND_IMAGE:-ai-career-mentor-backend:latest}
    restart: unless-stopped
    volumes: []
    expose: ["8000"]
    networks: [internal]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DEBUG: "False"

  celery_worker:
    image: ${BACKEND_IMAGE:-ai-career-mentor-backend:latest}
    command: celery -A config worker -l warning --concurrency=2
    restart: unless-stopped
    volumes: []
    networks: [internal]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DEBUG: "False"

  frontend:
    image: ${FRONTEND_IMAGE:-ai-career-mentor-frontend:latest}
    restart: unless-stopped
    expose: ["80"]
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks: [internal, public]

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  pgdata:
