[mypy]
python_version = 3.12
ignore_missing_imports = True
strict_optional = True
warn_redundant_casts = True
no_implicit_optional = True

# Third-party apps with partial stubs
[mypy-celery.*]
ignore_missing_imports = True

[mypy-kombu.*]
ignore_missing_imports = True

[mypy-rest_framework.*]
ignore_missing_imports = True

[mypy-rest_framework_simplejwt.*]
ignore_missing_imports = True

[mypy-corsheaders.*]
ignore_missing_imports = True

[mypy-drf_spectacular.*]
ignore_missing_imports = True

[mypy-environ.*]
ignore_missing_imports = True

[mypy-whitenoise.*]
ignore_missing_imports = True

[mypy-sentry_sdk.*]
ignore_missing_imports = True

[mypy-pypdf.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

# Django ORM model files — skip without django-stubs plugin.
# Field descriptors (CharField, UUIDField, …) look like untyped assignments
# to plain mypy; the plugin is needed to resolve them properly.
[mypy-apps.users.models]
ignore_errors = True

[mypy-apps.resumes.models]
ignore_errors = True

[mypy-apps.careers.models]
ignore_errors = True

[mypy-apps.jobs.models]
ignore_errors = True

[mypy-apps.interviews.models]
ignore_errors = True

[mypy-apps.chat.models]
ignore_errors = True

[mypy-apps.learning.models]
ignore_errors = True

# Auto-generated migration files
[mypy-apps.*.migrations.*]
ignore_errors = True
